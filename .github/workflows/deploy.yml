name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: filemover-webui/pnpm-lock.yaml

      - run: pnpm install
        working-directory: filemover-webui

      - run: pnpm build
        working-directory: filemover-webui

      - uses: actions/upload-pages-artifact@v3
        with:
          path: filemover-webui/dist

      - uses: actions/deploy-pages@v4
        id: deployment
